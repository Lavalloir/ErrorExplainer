<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Error Explainer</title>
  <link rel="stylesheet" href="css/popup.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <div class="header">
    <img src="icons/icon.png" style="width:28px;height:28px;border-radius:7px;" alt="Logo" />
    <div>
      <h1>Error Explainer</h1>
      <p>Symfony · Laravel · React · JS · PHP · etc</p>
    </div>
  </div>

  <!-- ===== ZONE DE SAISIE ===== -->
  <div class="input-area">

    <!-- Bannière affichée quand une page d'erreur est détectée automatiquement -->
    <div class="auto-detected-banner" id="autoDetectedBanner">
      <span>⚡</span>
      <span id="autoDetectedLabel">Page d'erreur détectée</span>
    </div>

    <!-- Filtre optionnel par technologie -->
    <div class="tech-select-row">
      <label for="techSelect">Tech :</label>
      <select id="techSelect">
        <option value="">— Toutes —</option>
        <option value="axios">Axios</option>
        <option value="composer">Composer</option>
        <option value="css">CSS</option>
        <option value="csharp">C#</option>
        <option value="docker">Docker</option>
        <option value="doctrine">Doctrine</option>
        <option value="git">Git</option>
        <option value="http">HTTP</option>
        <option value="javascript">JavaScript</option>
        <option value="laravel">Laravel</option>
        <option value="mysql">MySQL</option>
        <option value="nodejs">Node.js</option>
        <option value="npm">npm</option>
        <option value="php">PHP</option>
        <option value="react">React</option>
        <option value="symfony">Symfony</option>
        <option value="typescript">TypeScript</option>
        <option value="vite">Vite</option>
      </select>
    </div>

    <!-- Zone de saisie de l'erreur -->
    <textarea
      id="errorInput"
      placeholder="Colle ton message d'erreur ici…&#10;&#10;Ex: Call to a member function getId() on null&#10;Ex: No route found for GET /admin/users"
    ></textarea>

    <div class="actions">
      <button class="btn-primary" id="btnAnalyze">Analyser</button>
      <button class="btn-secondary" id="btnClear" title="Effacer">✕ Effacer</button>
    </div>

  </div>

  <!-- ===== ZONE DE RÉSULTAT ===== -->
  <div class="result-area" id="resultArea">
    <div class="result-empty">
      <span>🛠️</span>
      Colle une erreur et clique sur Analyser
    </div>
  </div>

  <script src="js/popup.js"></script>
</body>
</html>
